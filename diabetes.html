<!DOCTYPE html>
<html>
<head>
<title>Diabetes Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:Inter;
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    width:400px;
}
input,select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
    font-weight:600;
    cursor:pointer;
}
.result{
    margin-top:20px;
    padding:15px;
    background:rgba(6,182,212,0.1);
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">
<h2>Diabetes Risk Analysis</h2>

<form action="/predict" method="POST">
<input type="number" name="age" placeholder="Age" required>
<input type="number" name="bmi" placeholder="BMI" required>
<input type="number" name="glucose" placeholder="Blood Glucose Level" required>
<select name="hypertension" required>
<option value="">Select Hypertension Status</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
<select name="heart_disease" required>
<option value="">Select Heart Disease Status</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
<input type="number" name="hba1c" placeholder="HbA1c Level" required>

<select name="gender" required>
<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
<select name="smoking" required>
<option value="">Select Smoking Status</option>
<option value="Current">Current</option>
<option value="Ever">Ever</option>
<option value="Former">Former</option>
<option value="Never">Never</option>
<option value="Not Current">Not Current</option>
</select>

<button type="submit">Analyze Now</button>
</form>

{% if prediction_text %}
<div class="result">
<h3>{{ prediction_text }}</h3>
<p>Risk Probability: {{ probability }}%</p>
<p>{{ advice }}</p>
</div>
{% endif %}

</div>

</body>
</html>
